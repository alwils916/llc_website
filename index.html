<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Tyndall Climate Advisory</title>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Work+Sans:wght@300;400&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <nav>
                <span class=""nav-brand">Tyndall Climate Advisory</span>
                <div class="nav-links">
                    <a href="#about">about</a>
                    <a href="#contact">contact</a>
                </div>
            </nav>
        </header>

        <div class="hero">
            <!--<div class="hero-overlay"> -->
            <h1>Tyndall Climate Advisory</h1>
            <!--</div> -->
        </div>

        <div class="about" id="about">
            <img src="images/me.jpeg" alt="Andrew Wilson">
            <div class="about-text">
                <h2>About</h2>
                <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            </div>
            
            

        </div>

        <div class="contact" id="contact">
            <h2>Contact</h2>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
            <form action="https://formspree.io/f/mzdyyggl" method="POST">
                <input type="text" name="name" placeholder="Name">
                <input type="email" name="email" placeholder="Email">
                <textarea name="message" placeholder="Message"></textarea>
                <button type="submit">Submit</button>
            </form>
        </div>
        <script>
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.about, .contact').forEach(section => {
                observer.observe(section);
            });
        </script>

    </body>
</html>
